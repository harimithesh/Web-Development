<!DOCTYPE html>
<html>

<head>
<title> TODOLIST </title>
</head>
<style>
@import url("https://fonts.googleapis.com/css2?family=Bree+Serif&family=Caveat:wght@400;700&family=Lobster&family=Monoton&family=Open+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display+SC:ital,wght@0,400;0,700;1,700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Roboto:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+Pro:ital,wght@0,400;0,700;1,700&family=Work+Sans:ital,wght@0,400;0,700;1,700&display=swap");

.card {
    background-image: url(" https://d2clawv67efefq.cloudfront.net/ccbp-static-website/todolistbg.png");
    background-size: cover;
    height: 100vh;
}

.heading {
    color: white;
    font-weight: 700;
    text-align: center;
    font-family: "Roboto";
    font-size: 45px;
}

.para {
    color: white;
    padding: 10px;
    font-weight: 100;
    text-align: center;
    font-family: "Roboto";
}

.heading2 {
    color: white;
    font-weight: bold;
    font-family: "Roboto";
    font-size: 15px;
}

.para2 {
    color: white;
    padding: 2px;
    font-weight: 100;
    font-family: "Roboto";
}

.button-start {

    text-align: center;

}

.button {
    background-color: orange;
    color: white;
    font-family: "Roboto";
    font-weight: bold;
    font-size: 15px;
    width: 70px;
    padding: 8px;
}

.bottom-line {
    color: white;
    font-weight: 100;
    font-size: 10px;
    text-align: center;
    font-family: "Roboto";
    text-decoration: underline;
}
</style>

<body>
    <div class="card">
        <h1 class="heading">Todolist</h1>
        <p class="para">Each day i will accomplish one thing on my todo list.</p>
        <h1 class="heading2">Read a Book</h1>
        <p class="para2">I don't think that the human race will survive the next
            thousand years, unless we spread into space.There
            are too many accidents that can befall life on a single
            planet.But i'm an optimist...</p>
        <div class="button-start">
            <button class="button">Start</button>
        </div>
        <p class="bottom-line">Don't skip introduction</p>
    </div>
</body>
</html>
